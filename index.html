<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0d1014">
  <title>PortMap — карта портов свитчей</title>
  <meta name="description" content="Карта портов сетевых свитчей: VLAN, IP, MAC, хосты. QR-коды для каждого свитча.">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23e0a458'/%3E%3Crect x='7' y='9' width='5' height='5' rx='1' fill='%232a1c0c'/%3E%3Crect x='14' y='9' width='5' height='5' rx='1' fill='%2346e08a'/%3E%3Crect x='21' y='9' width='4' height='5' rx='1' fill='%232a1c0c'/%3E%3Crect x='7' y='18' width='5' height='5' rx='1' fill='%232a1c0c'/%3E%3Crect x='14' y='18' width='5' height='5' rx='1' fill='%232a1c0c'/%3E%3Crect x='21' y='18' width='4' height='5' rx='1' fill='%232a1c0c'/%3E%3C/svg%3E">

  <!-- мгновенно применяем сохранённую тему и шрифт, чтобы не было мигания -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem("portmap.theme") || "dark";
        document.documentElement.setAttribute("data-theme", t);
        var f = localStorage.getItem("portmap.font");
        if (f === "custom") {
          var d = localStorage.getItem("portmap.fontdata");
          if (d) {
            var s = document.createElement("style");
            s.id = "pm-custom-font";
            s.textContent = "@font-face{font-family:'PortMapCustom';src:url(" + d + ");font-display:swap}";
            document.head.appendChild(s);
            document.documentElement.style.setProperty("--ui-font", "'PortMapCustom', system-ui, sans-serif");
          }
        } else if (f) {
          document.documentElement.style.setProperty("--ui-font", "'" + f + "', system-ui, sans-serif");
        }
      } catch (e) {}
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main id="app"></main>

  <script src="qrcode.min.js"></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
